basePath: /api/v1
definitions:
  handlers.UpdateProfileRequest:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
  handlers.createCategoryRequest:
    properties:
      color:
        type: string
      icon:
        type: string
      name:
        type: string
      type:
        enum:
        - expense
        - income
        - both
        type: string
    required:
    - name
    - type
    type: object
  handlers.createTransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: string
      date:
        type: string
      description:
        type: string
      type:
        enum:
        - expense
        - income
        type: string
    required:
    - amount
    - date
    - type
    type: object
  handlers.createTransferRequest:
    properties:
      amount:
        type: number
      date:
        type: string
      description:
        type: string
      note:
        type: string
      to_workspace_id:
        type: string
    required:
    - amount
    - date
    - to_workspace_id
    type: object
  handlers.createWorkspaceRequest:
    properties:
      currency:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.registerRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  handlers.tokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  handlers.updateCategoryRequest:
    properties:
      color:
        type: string
      icon:
        type: string
      name:
        type: string
      type:
        enum:
        - expense
        - income
        - both
        type: string
    type: object
  handlers.updateTransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: string
      date:
        type: string
      description:
        type: string
    required:
    - amount
    - date
    type: object
  handlers.updateWorkspaceRequest:
    properties:
      currency:
        type: string
      name:
        type: string
    type: object
  handlers.upsertBudgetCategoryRequest:
    properties:
      limit_amount:
        type: number
    required:
    - limit_amount
    type: object
  handlers.upsertBudgetRequest:
    properties:
      categories:
        items:
          $ref: '#/definitions/services.BudgetCategoryInput'
        type: array
      total_limit:
        type: number
    required:
    - total_limit
    type: object
  services.BudgetCategoryInput:
    properties:
      category_id:
        type: string
      limit_amount:
        type: number
    type: object
  services.BudgetCategoryProgressView:
    properties:
      category_icon:
        type: string
      category_id:
        type: string
      category_name:
        type: string
      limit_amount:
        type: number
      remaining:
        type: number
      spent:
        type: number
    type: object
  services.BudgetView:
    properties:
      categories:
        items:
          $ref: '#/definitions/services.BudgetCategoryProgressView'
        type: array
      created_at:
        type: string
      id:
        type: string
      month:
        type: integer
      remaining:
        type: number
      total_limit:
        type: number
      total_spent:
        type: number
      updated_at:
        type: string
      workspace_id:
        type: string
      year:
        type: integer
    type: object
  services.CategoryView:
    properties:
      color:
        type: string
      created_at:
        type: string
      icon:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
      type:
        type: string
      workspace_id:
        type: string
    type: object
  services.CursorListResult:
    properties:
      items:
        items:
          $ref: '#/definitions/services.TransactionView'
        type: array
      next_cursor:
        type: string
    type: object
  services.DailySummaryResult:
    properties:
      items:
        items:
          $ref: '#/definitions/services.DailySummaryView'
        type: array
    type: object
  services.DailySummaryView:
    properties:
      date:
        type: string
      total_expense:
        type: number
      total_income:
        type: number
      total_transfer_in:
        type: number
      total_transfer_out:
        type: number
      transaction_count:
        type: integer
    type: object
  services.TransactionListResult:
    properties:
      items:
        items:
          $ref: '#/definitions/services.TransactionView'
        type: array
      total:
        type: integer
    type: object
  services.TransactionView:
    properties:
      amount:
        type: number
      category_id:
        type: string
      created_at:
        type: string
      date:
        type: string
      description:
        type: string
      id:
        type: string
      transfer_direction:
        type: string
      transfer_id:
        type: string
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      workspace_id:
        type: string
    type: object
  services.TransferResult:
    properties:
      in:
        $ref: '#/definitions/services.TransactionView'
      out:
        $ref: '#/definitions/services.TransactionView'
    type: object
  services.UserProfile:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  services.WorkspaceView:
    properties:
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API REST de finanzas personales
  title: FinApp API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Iniciar sesion
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token a invalidar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.refreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Sin contenido
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cerrar sesion
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Renovar tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Datos de registro
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Registrar usuario
      tags:
      - auth
  /user/profile:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.UserProfile'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obtener perfil del usuario autenticado
      tags:
      - user
    put:
      consumes:
      - application/json
      parameters:
      - description: Campos a actualizar (al menos uno requerido)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.UserProfile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Actualizar nombre o email del usuario
      tags:
      - user
  /workspaces:
    get:
